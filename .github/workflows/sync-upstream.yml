name: Sync upstream Red Light

on:
  schedule:
    # Poll off the top of the hour to reduce GitHub Actions scheduling delays.
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream-red-light
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out this repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Configure the sync commit author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge the upstream add-on
        id: sync
        run: ./import.sh

      - name: Build the self-update package
        if: steps.sync.outputs.changed == 'true'
        run: ./build_release.sh

      - name: Commit and push the update
        if: steps.sync.outputs.changed == 'true'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          UPSTREAM_SHA: ${{ steps.sync.outputs.upstream_sha }}
          VERSION: ${{ steps.sync.outputs.version }}
        run: |
          git add --all -- plugin.video.redlight .upstream-commit packages
          git commit \
            -m "chore: sync Red Light v${VERSION} from upstream" \
            -m "Upstream-Commit: ${UPSTREAM_SHA}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
